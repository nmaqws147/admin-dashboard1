pull_request:
  name: "طلب سحب"
  definition: >
    هو طلب يقدمه المطور لمراجعة ودمج تعديلاته على كود المشروع
    من فرع جانبي إلى الفرع الرئيسي.
  purpose:
    - "مراجعة التعديلات بواسطة الفريق"
    - "النقاش حول الكود قبل الدمج"
    - "اختبار التغييرات في بيئة آمنة"
  workflow:
    - "ينشئ المطور فرع جديد ويضيف تعديلات"
    - "يدفع (push) التعديلات إلى المستودع"
    - "يفتح Pull Request من الفرع الجديد إلى الرئيسي"
    - "يتم المراجعة والموافقة أو الطلب بتغييرات إضافية"
    - "بعد الموافقة، يتم الدمج (merge)"
  platforms:
    - "GitHub"
    - "GitLab"
    - "Bitbucket"
